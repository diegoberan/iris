custom_providers:
  - name: "Iris Subscription AMD"
    base_url: "http://localhost:8000/v1"
    model: "google/gemma-4-31B-it"
    api_mode: "chat_completions"
    api_key: "not-needed"
  # Iris Orchestrator loopback (tui_gateway/orchestrator.py, enabled via
  # IRIS_ORCHESTRATOR=1 in env.d). Tier 1 relays to the customer's Desktop
  # node (LM Studio on their own GPU); tier 2 falls back to this host's vLLM.
  - name: "LM Studio Bridge"
    base_url: "http://127.0.0.1:{{ORCH_PORT}}/v1"
    api_key: "not-needed"
    # Seed list only: the desktop's "edit models" refresh replaces it with
    # the machine's live LM Studio catalog (orchestrator /v1/models relay).
    models:
      - "google/gemma-4-12b-qat"
      - "ornith-1.0-9b"
    extra_headers:
      User-Agent: "hermes-agent/1.0"

model:
  default: google/gemma-4-31B-it
  provider: "custom:iris-subscription-amd"
  base_url: "http://localhost:8000/v1"
  api_mode: "chat_completions"
  api_key: "not-needed"

# Iris Local Services: when the customer's Desktop app has Local Services
# enabled, the gateway routes TTS through their own machine first
# (desktop-session, the cloned voice on their own GPU). When that isn't
# available (Local Services off), it falls back to Hermes' built-in Edge TTS
# on the server.
tts:
  provider: edge
  edge:
    voice: en-US-AriaNeural
  # Fail over to edge quickly when the customer's Desktop is offline — watch
  # replies auto-speak and would stall the 30s default otherwise. 20s (not 8)
  # because the cloned-voice synthesis of a paragraph on a consumer GPU
  # legitimately takes >8s and was losing the custom voice to the fallback.
  desktop_session:
    timeout: 20
  router:
    providers:
      - desktop-session
      - edge
